apiVersion: apps/v1
kind: Deployment

metadata:
  name: olivetti-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: olivetti-app

  template:
    metadata:
      labels:
        app: olivetti-app

    spec:
      containers:
      - name: olivetti-app
        image: abhishekjais/olivetti-app:latest

        ports:
        - containerPort: 5000